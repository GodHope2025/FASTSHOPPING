<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito | FastShopping</title>
    <link rel="stylesheet" href="./CSS/style.css">
    <link rel="stylesheet" href="./CSS/carrito.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navegación Superior Vinculada -->
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">Fast<span>Shopping</span></div>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="mundo-bebe.html">Mundo Bebé</a></li>
                    <li><a href="sports.html">Zona Sport</a></li>
                    <li><a href="carrito.html" class="active">Carrito</a></li>
                </ul>
            </nav>
            <div class="user-menu" id="user-menu-container"></div>
        </div>
    </header>

    <main class="main-layout">
        
        <section class="card hero-welcome">
            <div class="welcome-content">
                <h2>Tu Historial de Compra</h2>
                <p>Revisa los productos seleccionados antes de procesar tu pago.</p>
            </div>
        </section>

        <div class="cart-layout">
            <!-- Lista de productos -->
            <div class="cart-list card" id="contenedor-carrito">
                <!-- El JavaScript inyectará los productos aquí -->
            </div>

            <!-- Resumen de Pago -->
            <section class="card payment-card cart-summary">
                <h4>Resumen del Pedido</h4>
                <div class="total-row">
                    <span>Total a Pagar:</span>
                    <span id="total-carrito" class="price">S/ 0.00</span>
                </div>
                <div class="methods">
                    <div class="method">Yape</div>
                    <div class="method">Plin</div>
                </div>
                <button class="btn-confirm" onclick="procesarPago()">Procesar Pago Seguro</button>
            </section>
        </div>

    </main>

    <!-- Conexión con el cerebro del proyecto -->
    <script src="./JS/carrito.js"></script>
</body>
</html>
