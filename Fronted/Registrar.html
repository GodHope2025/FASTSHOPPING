<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta | FastShopping</title>
    <link rel="stylesheet" href="./CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">Fast<span>Shopping</span></div>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="mundo-bebe.html">Mundo Bebé</a></li>
                    <li><a href="sport.html">Zona Sport</a></li>
                    <li><a href="carrito.html">Carrito</a></li>
                </ul>
            </nav>
            <div class="user-menu" id="user-menu-container"></div>
        </div>
    </header>

    <main class="main-layout" style="display: flex; justify-content: center; align-items: center; min-height: 75vh;">
        <section class="card" style="width: 100%; max-width: 420px; text-align: left; margin: 0 auto; padding: 35px;">
            
            <div style="text-align: center; margin-bottom: 25px;">
                <span style="background: white; color: #6366f1; padding: 6px 16px; border-radius: 12px; font-weight: 700; font-size: 13px; margin-bottom: 10px; display: inline-block;">Nuevo Usuario</span>
                <h2 style="margin: 0; color: #1e293b; font-size: 24px;">Únete a FastShopping</h2>
            </div>

            <form id="form-registro">
                <div style="margin-bottom: 15px;">
                    <label style="font-weight: 600; font-size: 14px; display: block; margin-bottom: 8px; color: #1e293b;">Nombre Completo</label>
                    <input type="text" id="reg-name" placeholder="Ej: Aldo Milian" required style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); box-sizing: border-box; font-family: 'Inter', sans-serif; font-size: 14px; outline: none;">
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="font-weight: 600; font-size: 14px; display: block; margin-bottom: 8px; color: #1e293b;">Correo Electrónico</label>
                    <input type="email" id="reg-email" placeholder="tu@correo.com" required style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); box-sizing: border-box; font-family: 'Inter', sans-serif; font-size: 14px; outline: none;">
                </div>
                
                <div style="margin-bottom: 25px;">
                    <label style="font-weight: 600; font-size: 14px; display: block; margin-bottom: 8px; color: #1e293b;">Contraseña</label>
                    <input type="password" id="reg-pass" placeholder="Crea una contraseña segura" required style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); box-sizing: border-box; font-family: 'Inter', sans-serif; font-size: 14px; outline: none;">
                </div>
                
                <button type="button" onclick="ejecutarRegistro()" style="width: 100%; padding: 14px; border-radius: 12px; font-size: 16px; background: #6366f1; color: white; border: none; font-weight: bold; cursor: pointer;">Crear mi Cuenta</button>
            </form>
            
            <p style="text-align: center; margin-top: 20px; font-size: 14px; color: #475569; font-weight: 600;">
                ¿Ya tienes cuenta? <a href="login.html" style="color: #6366f1; text-decoration: none;">Inicia Sesión</a>
            </p>
        </section>
    </main>

    <script src="./JS/carrito.js"></script>
    <script>
        function ejecutarRegistro() {
            const nombre = document.getElementById('reg-name').value;
            const correo = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            if (nombre === "" || correo === "" || pass === "") {
                mostrarNotificacion("Completa todos los campos", "error");
                return;
            }
            
            localStorage.setItem('fastshopping_sesion', 'activa');
            localStorage.setItem('usuario_nombre', nombre); 

            mostrarNotificacion(`¡Cuenta creada, ${nombre}!`, "exito");
            setTimeout(() => { window.location.href = 'index.html'; }, 1500);
        }
    </script>
</body>
</html>
